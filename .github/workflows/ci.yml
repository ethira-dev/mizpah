name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: >
          cargo clippy -p mizpah --all-targets --
          -D warnings
          -D clippy::manual_assert
          -D clippy::uninlined_format_args
          -D clippy::map_unwrap_or
          -D clippy::redundant_clone

      - name: Test
        run: cargo test -p mizpah

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  machete:
    name: machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-machete
        uses: bnjbvr/cargo-machete@main

  miri:
    name: miri
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup nightly + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Miri tests (skip unsupported FFI)
        # Skip FFI / process helpers. Socket/network tests use #[cfg(not(miri))].
        run: >
          cargo +nightly miri test -p mizpah --
          --skip process_
          --skip signal_
          --skip setsid
          --skip hub_pid
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Typecheck
        working-directory: web
        run: npm run typecheck
