name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: >
          cargo clippy -p mizpah --all-targets --
          -D warnings
          -D clippy::manual_assert
          -D clippy::uninlined_format_args
          -D clippy::map_unwrap_or
          -D clippy::redundant_clone

      - name: Test
        run: cargo test -p mizpah

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  machete:
    name: machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-machete
        uses: bnjbvr/cargo-machete@main

  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup nightly + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Miri tests (skip unsupported FFI)
        # rust-toolchain.toml pins stable — RUSTUP_TOOLCHAIN forces nightly.
        # Re-add miri in case rustup refreshed the nightly channel mid-job.
        # Socket/network tests use #[cfg(not(miri))]; HOME avoids getpwuid_r.
        run: |
          set -euo pipefail
          rustup component add miri
          cargo miri setup
          # Also skip residual real-socket paths (reqwest keepalive setsockopt).
          cargo miri test -p mizpah -- \
            --skip process_ \
            --skip signal_ \
            --skip setsid \
            --skip hub_pid \
            --skip probe_hub \
            --skip run_hub_ \
            --skip ensure_hub_remote_denied \
            --skip ensure_hub_already_up \
            --skip download_with_progress \
            --skip real_download_ \
            --skip run_parsed_real_deps \
            --skip run_script_hub_unreachable \
            --skip post_batch_ \
            --skip fetch_browser_ws_url \
            --skip wait_for_cdp \
            --skip resolve_cdp_ws_url_fetch \
            --skip pipe_mode_ \
            --skip flush_batch_ \
            --skip open_reader_bzip2 \
            --skip bzip2
        env:
          RUSTUP_TOOLCHAIN: nightly
          MIRIFLAGS: -Zmiri-disable-isolation
          HOME: /tmp/mizpah-miri-home
          MIZPAH_CONFIG_DIR: /tmp/mizpah-miri-config

  audit:
    name: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Prefer cargo-audit directly: rustsec/audit-check fails when the token
      # cannot create check runs (org default GITHUB_TOKEN permissions).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit --file Cargo.lock --deny warnings

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Typecheck
        working-directory: web
        run: npm run typecheck
