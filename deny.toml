[graph]
all-features = false
no-default-features = false

[advisories]
yanked = "warn"
# Ignore only with a dated comment + issue link when unavoidable.
ignore = [
  # 2026-07-19: ratatui 0.29 → paste (proc-macro); no maintained drop-in in-tree yet.
  # https://rustsec.org/advisories/RUSTSEC-2024-0436
  "RUSTSEC-2024-0436",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  # notify (file follow) is CC0-1.0
  "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
